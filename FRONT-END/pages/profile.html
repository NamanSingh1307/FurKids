
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FurKids – Profile</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .profile-layout { display:grid; gap:1.5rem; grid-template-columns:340px 1fr; }
    .profile-avatar-area { text-align:center; padding:2rem 1.5rem; }
    .avatar-circle {
      width:100px; height:100px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-size:2.5rem; margin:0 auto 1rem;
    }
    .profile-name { font-size:1.3rem; font-weight:800; }
    .profile-sub  { font-size:.85rem; color:var(--text-muted); margin-top:.25rem; }
    .edit-field   { margin-bottom:1rem; }
    .edit-field label { font-size:.82rem; color:var(--text-muted); display:block; margin-bottom:.3rem; font-weight:500; }
    .stats-row    { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
    .stat-box     { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:1rem; text-align:center; }
    .stat-box .n  { font-size:1.6rem; font-weight:800; color:var(--primary); }
    .stat-box .l  { font-size:.78rem; color:var(--text-muted); margin-top:.2rem; }
    .pet-list-item { display:flex; align-items:center; gap:.75rem; padding:.75rem 0; border-bottom:1px solid var(--border); }
    .pet-list-item:last-child { border:none; }
    .pet-list-item .pl-icon { font-size:1.5rem; }
    .pet-list-item .pl-name { font-weight:700; font-size:.95rem; }
    .pet-list-item .pl-meta { font-size:.8rem; color:var(--text-muted); }
    @media(max-width:768px) { .profile-layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-brand">Fur<span>Kids</span> 🐾</a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="problem.html">Problem Solver</a>
      <a href="reminders.html">Reminders</a>
      <a href="records.html">Records</a>
      <a href="vets.html">Vets</a>
      <a href="guides.html">Guides</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container">
    <h1 class="section-title">👤 My <span>Profile</span></h1>

    <div class="profile-layout">

      <!-- Left: user card -->
      <div class="card profile-avatar-area">
        <div class="avatar-circle" id="avatarCircle">😊</div>
        <div class="profile-name" id="displayName">Pet Parent</div>
        <div class="profile-sub"  id="displayEmail">your@email.com</div>
        <div class="profile-sub" style="margin-top:.25rem" id="displayCity">India</div>
        <hr class="divider" />
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
          <div class="stat-box"><div class="n" id="statPets">—</div><div class="l">Pets</div></div>
          <div class="stat-box"><div class="n" id="statReminders">—</div><div class="l">Reminders</div></div>
          <div class="stat-box"><div class="n" id="statRecords">—</div><div class="l">Records</div></div>
        </div>
        <p style="font-size:.8rem;color:var(--text-muted)">Member since 2024 · FurKids v1.0</p>
      </div>

      <!-- Right: edit form + pet list -->
      <div style="display:flex;flex-direction:column;gap:1.5rem;">

        <!-- Edit profile -->
        <div class="card" style="padding:1.75rem">
          <h3 style="font-size:1.05rem;font-weight:800;margin-bottom:1.25rem">✏️ Edit Profile</h3>
          <div class="form-row">
            <div class="edit-field">
              <label>Full Name</label>
              <input type="text" id="fieldName" placeholder="Your name" />
            </div>
            <div class="edit-field">
              <label>Email</label>
              <input type="email" id="fieldEmail" placeholder="your@email.com" />
            </div>
          </div>
          <div class="form-row">
            <div class="edit-field">
              <label>City</label>
              <input type="text" id="fieldCity" placeholder="e.g. Mumbai" />
            </div>
            <div class="edit-field">
              <label>Phone</label>
              <input type="tel" id="fieldPhone" placeholder="+91 98765 43210" />
            </div>
          </div>
          <div class="edit-field">
            <label>Bio / Notes</label>
            <textarea id="fieldBio" placeholder="Tell us about your pet family..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
        </div>

        <!-- My pets list -->
        <div class="card" style="padding:1.75rem">
          <h3 style="font-size:1.05rem;font-weight:800;margin-bottom:1.25rem">🐾 My Pets</h3>
          <div id="spinner" class="spinner" style="margin:1rem auto;width:24px;height:24px;border-width:2px"></div>
          <div id="petListContainer"></div>
          <a href="dashboard.html" class="btn btn-outline btn-full" style="margin-top:1rem">+ Manage Pets</a>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  const SPECIES_EMOJI = { Dog:'🐶', Cat:'🐱', Bird:'🐦', Rabbit:'🐰', Fish:'🐠', Other:'🐾' };

  // ── Load profile from localStorage (simulated; no auth) ───
  function loadProfile() {
    const p = JSON.parse(localStorage.getItem('furkids_profile') || '{}');
    document.getElementById('fieldName').value  = p.name  || '';
    document.getElementById('fieldEmail').value = p.email || '';
    document.getElementById('fieldCity').value  = p.city  || '';
    document.getElementById('fieldPhone').value = p.phone || '';
    document.getElementById('fieldBio').value   = p.bio   || '';
    document.getElementById('displayName').textContent  = p.name  || 'Pet Parent';
    document.getElementById('displayEmail').textContent = p.email || 'your@email.com';
    document.getElementById('displayCity').textContent  = p.city  || 'India';
    // Avatar initial
    const initial = (p.name || 'P').charAt(0).toUpperCase();
    document.getElementById('avatarCircle').textContent = initial;
  }

  function saveProfile() {
    const p = {
      name:  document.getElementById('fieldName').value.trim(),
      email: document.getElementById('fieldEmail').value.trim(),
      city:  document.getElementById('fieldCity').value.trim(),
      phone: document.getElementById('fieldPhone').value.trim(),
      bio:   document.getElementById('fieldBio').value.trim(),
    };
    localStorage.setItem('furkids_profile', JSON.stringify(p));
    loadProfile();
    showToast('Profile saved!');
  }

  // ── Load pet list + stats from API ────────────────────────
  async function init() {
    try {
      const [pets, reminders, records] = await Promise.all([
        PetsAPI.getAll(), RemindersAPI.getAll(), RecordsAPI.getAll()
      ]);

      // Stats
      document.getElementById('statPets').textContent      = pets.length;
      document.getElementById('statReminders').textContent = reminders.length;
      document.getElementById('statRecords').textContent   = records.length;

      // Pet list
      const container = document.getElementById('petListContainer');
      if (!pets.length) {
        container.innerHTML = `<p style="color:var(--text-muted);font-size:.88rem">No pets added yet.</p>`;
      } else {
        container.innerHTML = pets.map(p => `
          <div class="pet-list-item">
            <div class="pl-icon">${SPECIES_EMOJI[p.species] || '🐾'}</div>
            <div>
              <div class="pl-name">${p.name}</div>
              <div class="pl-meta">${p.breed} · ${p.age} yrs · ${p.weight} kg</div>
            </div>
            <span class="badge badge-green" style="margin-left:auto">${p.species}</span>
          </div>`).join('');
      }
    } catch(e) {
      document.getElementById('petListContainer').innerHTML =
        `<p style="color:var(--text-muted);font-size:.85rem">Could not connect to backend.</p>`;
    } finally {
      document.getElementById('spinner').style.display = 'none';
    }
  }

  loadProfile();
  init();
</script>
</body>
</html>
